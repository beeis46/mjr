<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC · At Rest</title>
<meta name="description" content="ARC is briefly at rest for maintenance. The record holds.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='24' fill='%23000'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@400;500&family=DM+Sans:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #d9381e;
    --ultramarine: #1e3a8a;
    --ochre: #b87c1a;
    --viridian: #3d7249;
    --pure-black: #000000;
    --cold-white: #f4f6f9;
    --ink: #000000;
    --ink-mid: #2c2c2c;
    --ink-lt: #6e6e6e;
    --border: rgba(0,0,0,0.08);
    --ease-soft: cubic-bezier(0.45, 0, 0.55, 1);
    --ease-leave: cubic-bezier(0.65, 0, 0.35, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--cold-white);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  /*
    Choreography (seconds)
    0.4–2.6   M arrives, rising          1.0–4.2   J arrives, rising
    1.2–4.2   the ground line draws      1.8–4.2   R arrives last, rising
    6–13.5    J walks out (up-left, blurring); his space breathes closed
    11–18.5   M walks out (up-right, blurring); his space breathes closed
    13.5–18.5 the ground line lets go    15.5–21.5 R's film grain arrives
    15+       the crowd encircles, then closes in; R recedes into their scale
    20–42     the room goes dark, edges first
    ~49.6     pure black
    49–51.4   the phrase: in, a hairline flourish, one breath
    51.2–52.8 white blooms out of the words and swallows everything
    54+       "encore"
  */

  /* ── Film grain — with a faint projector flicker ── */
  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none;
    opacity: .018; mix-blend-mode: multiply;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/180px;
    animation: grain-flicker 1.4s steps(2) infinite;
  }
  @keyframes grain-flicker {
    0%, 100% { opacity: .018; }
    50%      { opacity: .026; }
  }

  /* ── Soft museum lighting — recedes as the others leave ── */
  .ambient {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 55% at 50% 42%, rgba(255,248,235,0.5), transparent 72%);
    filter: blur(34px);
    animation: ambient-arc 30s var(--ease-soft) forwards;
  }
  @keyframes ambient-arc {
    0%   { opacity: 0.85; }
    5%   { opacity: 1; }
    18%  { opacity: 0.9; }
    32%  { opacity: 1; }
    50%  { opacity: 0.92; }
    100% { opacity: 0.05; }
  }

  /* ── The stage — figures sit a breath above true center; the whole plane
        drifts almost imperceptibly with the cursor (parallax, set by JS) ── */
  .stage {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px 9vh;
    will-change: transform;
  }

  /* ── The ground — a hairline the three of them stand on; it draws itself
        in as they arrive and lets go once only R is left ── */
  .ground {
    --gy: clamp(140px, 21vh, 196px);
    position: absolute; left: 50%; top: 50%;
    width: min(580px, 74vw); height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.32) 20%, rgba(0,0,0,0.32) 80%, transparent);
    transform: translate(-50%, var(--gy)) scaleX(0);
    animation:
      ground-in 3s var(--ease-soft) 1.2s forwards,
      ground-out 5s var(--ease-soft) 13.5s forwards;
  }
  @keyframes ground-in  { to { transform: translate(-50%, var(--gy)) scaleX(1); } }
  @keyframes ground-out { to { opacity: 0; } }

  /* ── The trio — M, J, R. No group fade: each arrives alone, rising out of
        the canvas, and each leaves alone, walking out of frame ── */
  .trio {
    display: inline-flex; justify-content: center; align-items: flex-end;
  }
  .person {
    width: 150px;
    margin: 0 clamp(18px, 3vw, 30px);
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(16px, 3.4vh, 34px);
    overflow: hidden;
    flex: 0 0 auto;
    opacity: 0;
    will-change: opacity, transform, filter, max-width, margin;
  }
  /* arrival: a soft rise out of the white, unblurring like a memory forming */
  @keyframes arrive {
    0%   { opacity: 0; filter: blur(9px); transform: translateY(34px); }
    100% { opacity: 1; filter: blur(0);   transform: translateY(0); }
  }

  .person .letter {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(64px, 9vw, 116px); line-height: 1;
    letter-spacing: .04em; color: var(--ink);
    will-change: transform;
    animation: letter-float 9s var(--ease-soft) infinite;
  }
  /* each letter hovers on its own slow current */
  @keyframes letter-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  /* each figure breathes — a slow, standing stillness that is not still */
  .person .fig {
    width: clamp(80px, 10vw, 116px); height: auto; display: block;
    transform-origin: 50% 100%;
  }
  @keyframes fig-breathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.014) scaleX(0.995); }
  }

  /* M — warm, broad, with an aura; arrives first, leaves second */
  .person-m {
    animation:
      arrive 2.2s var(--ease-soft) 0.4s both,
      depart-m 7.5s var(--ease-leave) 11s forwards;
  }
  .person-m .letter { color: #1c1310; animation-delay: 1.1s; animation-duration: 8.4s; }
  .person-m .fig { animation: fig-breathe 6.4s var(--ease-soft) 2.6s infinite; }
  .person-m .aura { animation: aura-breathe 5.5s var(--ease-soft) 1.2s infinite; }
  @keyframes aura-breathe {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }

  /* J — center, tall and lean; arrives second, leaves first */
  .person-j {
    width: 168px;
    animation:
      arrive 2.4s var(--ease-soft) 1s both,
      depart-j 7.5s var(--ease-leave) 6s forwards;
  }
  .person-j .letter { font-size: clamp(72px, 10.2vw, 132px); color: #111a28; animation-delay: 2s; }
  .person-j .fig { width: clamp(92px, 11.4vw, 132px); animation: fig-breathe 7.6s var(--ease-soft) 3.2s infinite; }

  /* R — italic, echoing the R in the ARC wordmark; arrives last, stays,
     and is unmade slowly */
  .person-r {
    transform-origin: 50% 62%;
    animation:
      arrive 2.4s var(--ease-soft) 1.8s both,
      r-diminish 26s var(--ease-soft) 16s forwards,
      r-oblivion 28s var(--ease-soft) 17.5s forwards;
  }
  .person-r .letter { font-style: italic; color: #000000; animation-delay: 2.8s; animation-duration: 7.6s; }
  .person-r .fig { width: clamp(88px, 11vw, 124px); animation: fig-breathe 5.6s var(--ease-soft) 4.2s infinite; }
  @keyframes r-oblivion {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  /* not just smaller — further away: he sinks slightly as he recedes,
     down to the scale of the multitude */
  @keyframes r-diminish {
    0%   { transform: translateY(0)    scale(1); }
    100% { transform: translateY(14px) scale(0.2); }
  }

  /* departures: each walks out of frame — a drift up and away, blurring as
     he goes; only after he is fully gone does his space breathe closed */
  @keyframes depart-j {
    0%   { opacity: 1; filter: blur(0);    transform: translate(0, 0);         max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    55%  { opacity: 0; filter: blur(10px); transform: translate(-34px, -48px); max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    100% { opacity: 0; filter: blur(10px); transform: translate(-34px, -48px); max-width: 0;     margin-left: 0; margin-right: 0; }
  }
  @keyframes depart-m {
    0%   { opacity: 1; filter: blur(0);    transform: translate(0, 0);        max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    55%  { opacity: 0; filter: blur(10px); transform: translate(38px, -44px); max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    100% { opacity: 0; filter: blur(10px); transform: translate(38px, -44px); max-width: 0;     margin-left: 0; margin-right: 0; }
  }

  /* The grain arrives with the solitude — fine film noise across the lone figure */
  .fig-grain {
    mix-blend-mode: screen;
    opacity: 0;
    animation: grain-in 6s var(--ease-soft) 15.5s forwards;
  }
  @keyframes grain-in { to { opacity: 0.32; } }

  /* ── The multitude — tiny silhouettes that first encircle R from the edges,
        then close in and multiply until the entire screen is black ── */
  .crowd {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Faint colorful overlays — the color belongs to the company: each wash
        recedes as its person leaves, so when only R remains, all color is
        gone. The tint plane counter-drifts against the cursor for depth. ── */
  .tints { position: fixed; inset: 0; z-index: 0; pointer-events: none; will-change: transform; }
  .tint {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(72px);
    opacity: 0;
  }
  .tint-cool {
    left: 50%; top: 43%; width: 480px; height: 430px;
    background: radial-gradient(circle, rgba(150,178,228,0.5), transparent 68%);
    animation: tint-with-j 11s var(--ease-soft) forwards;
  }
  .tint-warm {
    left: 39%; top: 47%; width: 440px; height: 390px;
    background: radial-gradient(circle, rgba(233,176,158,0.5), transparent 68%);
    animation: tint-with-m 16s var(--ease-soft) forwards;
  }
  .tint-lav {
    left: 45%; top: 37%; width: 360px; height: 340px;
    background: radial-gradient(circle, rgba(202,178,226,0.42), transparent 68%);
    animation: tint-with-m 16s var(--ease-soft) forwards;
  }
  .tint-mint {
    left: 44%; top: 55%; width: 340px; height: 320px;
    background: radial-gradient(circle, rgba(172,214,193,0.4), transparent 68%);
    animation: tint-with-m-late 15s var(--ease-soft) forwards;
  }
  @keyframes tint-with-j {
    0%   { opacity: 0; }
    18%  { opacity: 0.5; }
    53%  { opacity: 0.5; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m {
    0%   { opacity: 0; }
    11%  { opacity: 0.46; }
    71%  { opacity: 0.46; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m-late {
    0%   { opacity: 0; }
    12%  { opacity: 0.4; }
    77%  { opacity: 0.4; }
    100% { opacity: 0; }
  }

  /* ── The vignette — the room itself closes in as the crowd gathers,
        edges first, the way a theatre goes dark ── */
  .vignette {
    position: fixed; inset: 0; z-index: 4; pointer-events: none;
    background: radial-gradient(ellipse 95% 90% at 50% 46%, transparent 52%, rgba(0,0,0,0.55) 100%);
    opacity: 0;
    animation: vignette-in 22s var(--ease-soft) 20s forwards;
  }
  @keyframes vignette-in { to { opacity: 1; } }

  /* ── The envoi — out of the black: canvas-white cursive, centered, with a
        hairline flourish that draws itself beneath the words ── */
  .envoi {
    position: fixed; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    padding: 0 24px;
    pointer-events: none;
  }
  .envoi span {
    font-family: 'Parisienne', cursive;
    font-size: clamp(36px, 6.5vw, 78px);
    line-height: 1.3;
    color: var(--cold-white);
    text-align: center;
    opacity: 0;
    letter-spacing: 0.01em;
    text-shadow: 0 0 28px rgba(244,246,249,0.14);
    animation:
      envoi-in 1.1s var(--ease-soft) 49s forwards,
      envoi-breathe 1.3s var(--ease-soft) 50.1s 1;
  }
  /* it rises the last few pixels as it arrives — an exhale, widening */
  @keyframes envoi-in {
    0%   { opacity: 0; letter-spacing: 0.01em; transform: translateY(10px); }
    100% { opacity: 1; letter-spacing: 0.07em; transform: translateY(0); }
  }
  @keyframes envoi-breathe {
    0%   { opacity: 1;    transform: scale(1); }
    50%  { opacity: 0.78; transform: scale(1.015); }
    100% { opacity: 1;    transform: scale(1); }
  }
  /* the flourish — a hairline that draws itself beneath the cursive */
  .envoi span::after {
    content: "";
    display: block;
    width: 42%; height: 1px;
    margin: 0.22em auto 0;
    background: linear-gradient(90deg, transparent, rgba(244,246,249,0.7), transparent);
    transform: scaleX(0);
    animation: flourish 1.5s var(--ease-soft) 49.7s forwards;
  }
  @keyframes flourish { to { transform: scaleX(1); } }

  /* ── The bloom — white grows out of the words themselves and swallows the
        whole scene; the phrase, being the same white, dissolves into it ── */
  .whiteout {
    position: fixed; inset: 0; z-index: 20;
    background: var(--cold-white);
    pointer-events: none;
    clip-path: circle(0% at 50% 50%);
    animation: bloom 1.6s cubic-bezier(0.6, 0, 0.3, 1) 51.2s forwards;
  }
  @keyframes bloom { to { clip-path: circle(125% at 50% 50%); } }

  /* ── Encore — after the canvas is blank, one quiet word, framed by
        hairlines that reach outward when met ── */
  .replay {
    position: fixed; left: 50%; bottom: clamp(22px, 5vh, 46px);
    transform: translateX(-50%);
    z-index: 30;
    display: flex; align-items: center; gap: 14px;
    background: none; border: 0; cursor: pointer;
    font-family: 'Cormorant SC', serif; font-weight: 500;
    font-size: clamp(12px, 1.5vw, 15px);
    letter-spacing: 0.3em; text-indent: 0.15em;
    color: var(--ink-lt);
    opacity: 0; pointer-events: none;
    transition: opacity 2.8s var(--ease-soft), color 0.5s ease;
  }
  .replay::before, .replay::after {
    content: ""; height: 1px; width: 26px;
    background: currentColor; opacity: 0.5;
    transition: width 0.8s var(--ease-soft);
  }
  .replay.is-on { opacity: 0.8; pointer-events: auto; }
  .replay:hover, .replay:focus-visible { color: var(--ink); outline: none; }
  .replay:hover::before, .replay:hover::after { width: 46px; }

  @media (max-width: 640px) {
    .trio { transform: scale(0.62); }
    .ground { --gy: 14vh; }
  }

  /* ── Reduced motion — a still tableau instead of a film ── */
  @media (prefers-reduced-motion: reduce) {
    .ambient, .tints, .crowd, .vignette, .whiteout, .envoi, .replay { display: none; }
    .grain, .person, .person .letter, .person .fig, .person-m .aura,
    .fig-grain, .ground { animation: none; }
    .person { opacity: 1; }
    .ground { transform: translate(-50%, var(--gy)) scaleX(1); opacity: 0.6; }
  }
</style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ambient" aria-hidden="true"></div>
  <div class="tints" aria-hidden="true">
    <span class="tint tint-warm"></span>
    <span class="tint tint-cool"></span>
    <span class="tint tint-lav"></span>
    <span class="tint tint-mint"></span>
  </div>
  <!-- two layers: the base accumulates settled figures; the top canvas lets
       each new arrival rise and breathe in before settling onto the base -->
  <canvas class="crowd" id="crowdBase" aria-hidden="true"></canvas>
  <canvas class="crowd" id="crowdFade" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Shared definitions: three distinct silhouettes; gradients, grain, aura ── -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="figFade" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#000000" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#0a0a0a" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#1a1a1a" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#1a1a1a" stop-opacity="0"/>
      </linearGradient>
      <!-- J: cooler-toned dark -->
      <linearGradient id="figFadeCool" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#070d1a" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#0c1422" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#18222f" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#18222f" stop-opacity="0"/>
      </linearGradient>
      <!-- M: warmer-toned dark -->
      <linearGradient id="figFadeWarm" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#160c06" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#1b1009" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#241a12" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#241a12" stop-opacity="0"/>
      </linearGradient>
      <!-- M's aura — a warm halo that no one else has -->
      <radialGradient id="auraGlow" cx="0.5" cy="0.42" r="0.6">
        <stop offset="0"    stop-color="#f2cd96" stop-opacity="0.7"/>
        <stop offset="0.55" stop-color="#eec488" stop-opacity="0.28"/>
        <stop offset="1"    stop-color="#eec488" stop-opacity="0"/>
      </radialGradient>
      <filter id="figGrain" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" seed="11" result="noise"/>
        <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
        <feComponentTransfer in="mono" result="opaqueGrain">
          <feFuncA type="discrete" tableValues="1"/>
        </feComponentTransfer>
        <feComposite in="opaqueGrain" in2="SourceGraphic" operator="in"/>
      </filter>

      <!-- J — tall, lean, upright: a long neck, level shoulders, and a chest
           that tapers cleanly. The head sits high in the frame. -->
      <g id="jBody">
        <path d="M130 22
                 C 152 22 168 40 168 66
                 C 168 84 162 98 152 107
                 C 145 113 138 116 130 116
                 C 122 116 115 113 108 107
                 C 98 98 92 84 92 66
                 C 92 40 108 22 130 22 Z"/>
        <path d="M118 111
                 L 118 140
                 C 118 146 123 149 130 149
                 C 137 149 142 146 142 140
                 L 142 111
                 C 137 120 123 120 118 111 Z"/>
        <path d="M130 141
                 C 118 142 108 145 99 150
                 C 84 158 70 166 62 176
                 C 57 183 55 191 56 200
                 C 58 220 64 258 68 300
                 L 192 300
                 C 196 258 202 220 204 200
                 C 205 191 203 183 198 176
                 C 190 166 176 158 161 150
                 C 152 145 142 142 130 141 Z"/>
      </g>

      <!-- M — shorter but built: shoulders far wider than the head, squared
           and confident, tapering with intent. -->
      <g id="mBody">
        <path d="M130 64
                 C 154 64 172 82 172 108
                 C 172 124 166 137 156 145
                 C 148 151 139 154 130 154
                 C 121 154 112 151 104 145
                 C 94 137 88 124 88 108
                 C 88 82 106 64 130 64 Z"/>
        <path d="M116 149
                 L 116 172
                 C 116 178 122 181 130 181
                 C 138 181 144 178 144 172
                 L 144 149
                 C 138 158 122 158 116 149 Z"/>
        <path d="M130 173
                 C 115 174 102 177 91 183
                 C 72 193 50 202 38 214
                 C 31 222 27 232 26 244
                 C 24 262 23 280 23 300
                 L 237 300
                 C 237 280 236 262 234 244
                 C 233 232 229 222 222 214
                 C 210 202 188 193 169 183
                 C 158 177 145 174 130 173 Z"/>
      </g>

      <!-- R — shortest and widest: the head sinks straight into rounded,
           sloping shoulders with no neck at all, and the body swells outward
           the whole way down. No taper, no aura, no air. -->
      <g id="rBody">
        <path d="M130 96
                 C 156 96 174 114 174 140
                 C 174 156 168 168 158 176
                 C 150 182 140 185 130 185
                 C 120 185 110 182 102 176
                 C 92 168 86 156 86 140
                 C 86 114 104 96 130 96 Z"/>
        <path d="M130 176
                 C 112 178 96 183 84 190
                 C 68 199 54 210 46 223
                 C 39 234 34 248 31 264
                 C 28 278 26 290 25 300
                 L 235 300
                 C 234 290 232 278 229 264
                 C 226 248 221 234 214 223
                 C 206 210 192 199 176 190
                 C 164 183 148 178 130 176 Z"/>
      </g>
    </defs>
  </svg>

  <main class="stage">
    <div class="ground" aria-hidden="true"></div>
    <div class="trio" role="img" aria-label="Three silhouettes: M, J, and R">
      <!-- M — warm-toned, broad, with an aura; arrives first, leaves second -->
      <div class="person person-m">
        <span class="letter">M</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true">
          <ellipse class="aura" cx="130" cy="165" rx="126" ry="140" fill="url(#auraGlow)"/>
          <use href="#mBody" fill="url(#figFadeWarm)"/>
        </svg>
      </div>
      <!-- J — center, tall and lean; arrives second, leaves first -->
      <div class="person person-j">
        <span class="letter">J</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true"><use href="#jBody" fill="url(#figFadeCool)"/></svg>
      </div>
      <!-- R — arrives last; the one who remains, alone, drained of color -->
      <div class="person person-r">
        <span class="letter">R</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true">
          <g class="fig-inner">
            <use href="#rBody" fill="url(#figFade)"/>
            <use href="#rBody" class="fig-grain" filter="url(#figGrain)"/>
          </g>
        </svg>
      </div>
    </div>
  </main>

  <!-- The last word, waiting inside the black -->
  <div class="envoi">
    <span lang="fr">pas comme les autres</span>
  </div>

  <!-- The white that blooms out of the words and takes everything back -->
  <div class="whiteout" aria-hidden="true"></div>

  <!-- Once the canvas is blank, one quiet offer -->
  <button class="replay" type="button" lang="fr">encore</button>

  <script>
  (function () {
    'use strict';

    var reduceMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return; // the CSS shows a still tableau instead

    var t0 = performance.now();

    // ── Encore ─────────────────────────────────────────────────────────────
    var replay = document.querySelector('.replay');
    if (replay) {
      setTimeout(function () { replay.classList.add('is-on'); }, 54000);
      replay.addEventListener('click', function () { location.reload(); });
    }

    // ── Parallax — the stage and the color plane drift a few pixels against
    //    the cursor, in opposite directions, giving the tableau depth ──────
    var stage = document.querySelector('.stage');
    var tints = document.querySelector('.tints');
    if (stage && window.matchMedia('(pointer: fine)').matches) {
      var ptx = 0, pty = 0, pcx = 0, pcy = 0;
      window.addEventListener('pointermove', function (e) {
        ptx = e.clientX / window.innerWidth - 0.5;
        pty = e.clientY / window.innerHeight - 0.5;
      });
      (function drift() {
        pcx += (ptx - pcx) * 0.035;
        pcy += (pty - pcy) * 0.035;
        stage.style.transform = 'translate(' + (pcx * 12).toFixed(2) + 'px,' + (pcy * 9).toFixed(2) + 'px)';
        if (tints) tints.style.transform = 'translate(' + (-pcx * 18).toFixed(2) + 'px,' + (-pcy * 14).toFixed(2) + 'px)';
        if (performance.now() - t0 < 51500) requestAnimationFrame(drift);
      })();
    }

    // ── The multitude ──────────────────────────────────────────────────────
    var base = document.getElementById('crowdBase');
    var top = document.getElementById('crowdFade');
    if (!base || !base.getContext || !top || !top.getContext) return;
    var bctx = base.getContext('2d');
    var fctx = top.getContext('2d');

    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, started = false;

    function size() {
      W = window.innerWidth; H = window.innerHeight;
      [[base, bctx], [top, fctx]].forEach(function (pair) {
        pair[0].width = Math.floor(W * dpr);
        pair[0].height = Math.floor(H * dpr);
        pair[0].style.width = W + 'px';
        pair[0].style.height = H + 'px';
        pair[1].setTransform(dpr, 0, 0, dpr, 0, 0);
        pair[1].fillStyle = '#000';
      });
    }
    size();
    // Resizing clears the accumulated canvas, so only honor it before the crowd begins.
    window.addEventListener('resize', function () { if (!started) size(); });

    // Timeline (ms from load). R is alone at ~15s.
    var START = 15000;        // the first few tiny silhouettes appear
    var BLACK_START = 38000;  // they begin to multiply in earnest
    var BLACK_END = 48000;    // the screen is essentially black
    var SETTLE_END = 49600;   // a slow wash carries it the last step to pure black
    var WASH_START = BLACK_END - 5000;
    var FADE = 1700;          // each early silhouette breathes in over this long
    var RISE = 12;            // …rising these few pixels as it forms
    var REF_FRAME = 1000 / 60;
    var MAX_FADING = 900;     // safety cap on individually-animated figures

    // Exact expected number of silhouettes between two moments — an integral
    // of the spawn-rate curve. Time-based, so the crowd stays in sync with the
    // CSS timeline at any refresh rate, and catches up cleanly if the tab was
    // hidden and requestAnimationFrame paused.
    function spawnsBetween(a, b) {
      var total = 0;
      var s0 = Math.max(a, START), s1 = Math.min(b, BLACK_START);
      if (s1 > s0) {
        var D = BLACK_START - START;
        var u0 = s0 - START, u1 = s1 - START;
        total += (0.5 * (u1 - u0) + (13 / (3 * D * D)) * (u1 * u1 * u1 - u0 * u0 * u0)) / REF_FRAME;
      }
      var d0 = Math.max(a, BLACK_START), d1 = Math.min(b, BLACK_END);
      if (d1 > d0) {
        var DB = BLACK_END - BLACK_START;
        var v0 = d0 - BLACK_START, v1 = d1 - BLACK_START;
        total += (10 * (v1 - v0) + (35 / DB) * (v1 * v1 - v0 * v0)) / REF_FRAME;
      }
      return total;
    }

    // A single tiny silhouette — head + sloping shoulders, echoing the main figures
    function drawPerson(ctx, cx, topY, h, alpha) {
      ctx.globalAlpha = alpha;
      var hx = 0.16 * h, hy = 0.19 * h;
      var headCy = topY + hy + 0.02 * h;
      ctx.beginPath();
      ctx.ellipse(cx, headCy, hx, hy, 0, 0, Math.PI * 2);
      ctx.fill();
      var shTop = headCy + hy * 0.72;
      var bot = topY + h;
      var sh = 0.30 * h, bw = 0.24 * h;
      ctx.beginPath();
      ctx.moveTo(cx - 0.05 * h, shTop);
      ctx.quadraticCurveTo(cx - sh, shTop + 0.04 * h, cx - sh, shTop + 0.32 * h);
      ctx.lineTo(cx - bw, bot);
      ctx.lineTo(cx + bw, bot);
      ctx.lineTo(cx + sh, shTop + 0.32 * h);
      ctx.quadraticCurveTo(cx + sh, shTop + 0.04 * h, cx + 0.05 * h, shTop);
      ctx.closePath();
      ctx.fill();
    }

    var carry = 0;     // fractional spawn accumulator
    var fading = [];   // silhouettes still forming
    var lastT = 0;

    function frame() {
      var t = performance.now() - t0;
      var dt = t - lastT;

      // ── spawn ──
      if (t >= START && lastT < BLACK_END) {
        started = true;
        carry += spawnsBetween(Math.max(lastT, START), Math.min(t, BLACK_END));
        var n = Math.floor(carry);
        carry -= n;

        var inBlack = t >= BLACK_START;
        var settleDirect = inBlack || dt > 400; // hidden-tab backlog settles instantly
        var p = inBlack ? 1 : (t - START) / (BLACK_START - START);
        // early on, the crowd keeps its distance — a hollow ring around R
        // that closes as their numbers grow
        var keepOut = (1 - p) * 0.17 * W;

        for (var i = 0; i < n; i++) {
          var cx = Math.random() * W;
          if (keepOut > 0 && Math.abs(cx - W / 2) < keepOut) {
            var dir = cx >= W / 2 ? 1 : -1;
            cx = W / 2 + dir * (keepOut + Math.random() * Math.max(1, W / 2 - keepOut));
            cx = Math.min(W - 2, Math.max(2, cx));
          }
          var h = inBlack ? (12 + Math.random() * 22) : (10 + Math.random() * 16);
          var topY = Math.random() * (H - h);
          var a = inBlack ? 0.92 : (0.45 + Math.random() * 0.4);
          if (settleDirect || fading.length >= MAX_FADING) {
            drawPerson(bctx, cx, topY, h, a);
          } else {
            fading.push({ cx: cx, topY: topY, h: h, a: a, born: t });
          }
        }
      }

      // ── the young silhouettes rise and breathe in on the top layer;
      //    the matured settle permanently onto the base ──
      if (fading.length) {
        fctx.clearRect(0, 0, W, H);
        for (var j = fading.length - 1; j >= 0; j--) {
          var q = fading[j];
          var e = (t - q.born) / FADE;
          if (e >= 1) {
            drawPerson(bctx, q.cx, q.topY, q.h, q.a);
            fading.splice(j, 1);
          } else {
            var k = e * e * (3 - 2 * e); // smoothstep
            drawPerson(fctx, q.cx, q.topY + (1 - k) * RISE, q.h, q.a * k);
          }
        }
        if (!fading.length) fctx.clearRect(0, 0, W, H);
      }

      // ── a slow, strengthening wash carries the scene to pure black ──
      // frame-rate independent: per-frame strength is normalized by dt
      if (t >= WASH_START && lastT < SETTLE_END) {
        var wp = Math.min((t - WASH_START) / (SETTLE_END - WASH_START), 1);
        var strength = 0.004 + 0.05 * wp * wp;
        bctx.globalAlpha = Math.min(1, 1 - Math.pow(1 - strength, dt / REF_FRAME));
        bctx.fillRect(0, 0, W, H);
        bctx.globalAlpha = 1;
      }

      lastT = t;

      if (t < SETTLE_END || fading.length) {
        requestAnimationFrame(frame);
      } else {
        // the wash has already finished the job; this is a safety net
        bctx.globalAlpha = 1;
        bctx.fillRect(0, 0, W, H);
      }
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
