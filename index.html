<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC · At Rest</title>
<meta name="description" content="ARC is briefly at rest for maintenance. The record holds.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='24' fill='%23000'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@400;500&family=DM+Sans:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #d9381e;
    --ultramarine: #1e3a8a;
    --ochre: #b87c1a;
    --viridian: #3d7249;
    --pure-black: #000000;
    --cold-white: #f4f6f9;
    --ink: #000000;
    --ink-mid: #2c2c2c;
    --ink-lt: #6e6e6e;
    --border: rgba(0,0,0,0.08);
    --ease-soft: cubic-bezier(0.45, 0, 0.55, 1);
    --ease-leave: cubic-bezier(0.65, 0, 0.35, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--cold-white);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  /*
    Choreography (seconds)
    0.5–3.9   the sign lights up, letter by letter: The MJR Hospital
    0.4–4.2   M, J, R arrive below, rising; the ground line draws itself
    4.5–8.3   J leaves quickly (up-left, blurring); the J dies on the sign,
              taking T, e, o, p, a with it
    8–15      M stays a few seconds longer, then leaves slowly (up-right);
              the M dies gently, taking h, H, s, t, l — leaving  R … i
    12.4–16   the R gives up its capital, the i is raised; the two survivors
              draw together at the center of the sign
    12–17     the ground line lets go    13.5–19.5  R's film grain arrives
    16.6–17.6 centered and alone, the anchor drops: the otaku plunges
              violently to the bottom of the page, yanking the raised I down
              after him, their spacing kept; the page jolts on impact and a
              shockwave line spreads along the floor
    17.6+     the impact wakes the multitude — they seep up from the bottom
              and the edges, then close in
    18.5+     R shrinks into their scale where he lies; the r and the fallen
              I fade away with him (18–29)
    20–42     the room goes dark, edges first    ~49.6  pure black
    49–51.3   the phrase: small, quiet, one breath
    50.2–53.8 canvas white pours in from above AND rises from below —
              waterfall and fountain, three veils each, meeting over the
              phrase; a fine paper noise settles into the blank
    55+       "encore"
  */

  /* ── Film grain — with a faint projector flicker ── */
  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none;
    opacity: .018; mix-blend-mode: multiply;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/180px;
    animation: grain-flicker 1.4s steps(2) infinite;
  }
  @keyframes grain-flicker {
    0%, 100% { opacity: .018; }
    50%      { opacity: .022; }
  }

  /* ── Soft museum lighting — recedes as the others leave ── */
  .ambient {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 55% at 50% 42%, rgba(255,248,235,0.5), transparent 72%);
    filter: blur(34px);
    animation: ambient-arc 30s var(--ease-soft) forwards;
  }
  @keyframes ambient-arc {
    0%   { opacity: 0.85; }
    5%   { opacity: 1; }
    18%  { opacity: 0.9; }
    32%  { opacity: 1; }
    50%  { opacity: 0.92; }
    100% { opacity: 0.05; }
  }

  /* ── The sign — The MJR Hospital, top center. Every letter is its own
        element: it descends into place on arrival, and dies individually as
        its person leaves, the way a sign loses its letters. Layout is
        preserved, so the survivors keep their places:  R … i  ── */
  .sign {
    position: fixed; top: clamp(26px, 6vh, 62px); left: 0; right: 0;
    z-index: 3; pointer-events: none;
    text-align: center;
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(30px, 5.4vw, 60px);
    letter-spacing: 0.1em;
    color: var(--ink);
  }
  .sign .lt {
    display: inline-block;
    opacity: 0;
    will-change: opacity, transform, filter;
  }
  /* word gaps */
  .lt-e1, .lt-R { margin-right: 0.48em; }

  /* a letter descends into place, unblurring — the sign lighting up */
  @keyframes lt-in {
    0%   { opacity: 0; filter: blur(4px); transform: translateY(-8px); }
    100% { opacity: 1; filter: blur(0);   transform: translateY(0); }
  }
  /* a letter dies — it slips down and out of focus */
  @keyframes lt-out {
    0%   { opacity: 1; filter: blur(0);   transform: translateY(0); }
    100% { opacity: 0; filter: blur(4px); transform: translateY(7px); }
  }
  /* the muted pair — r and I arrive already a shade quieter than the rest:
     a softer grey, never quite full presence, a breath out of focus */
  @keyframes lt-in-muted {
    0%   { opacity: 0;    filter: blur(4px);   transform: translateY(-8px); }
    100% { opacity: 0.72; filter: blur(0.4px); transform: translateY(0); }
  }
  /* the survivors fade from the sign as he begins to shrink */
  @keyframes lt-linger { to { opacity: 0; } }

  /* The — T and e die with J; h dies with M */
  .lt-T  { animation: lt-in 1.6s var(--ease-soft) 0.50s both, lt-out 2.6s var(--ease-soft) 5.0s forwards; }
  .lt-h1 { animation: lt-in 1.6s var(--ease-soft) 0.66s both, lt-out 4.2s var(--ease-soft) 8.9s forwards; }
  .lt-e1 { animation: lt-in 1.6s var(--ease-soft) 0.82s both, lt-out 2.6s var(--ease-soft) 5.6s forwards; }
  /* MJR — each dies with its silhouette */
  .lt-M  { color: #1c1310; animation: lt-in 1.6s var(--ease-soft) 1.00s both, lt-out 4.2s var(--ease-soft) 8.2s forwards; }
  .lt-J  { color: #111a28; animation: lt-in 1.6s var(--ease-soft) 1.15s both, lt-out 2.8s var(--ease-soft) 4.6s forwards; }
  .lt-R  { font-style: italic; color: #414141; animation: lt-in-muted 1.6s var(--ease-soft) 1.30s both, lt-linger 11s var(--ease-soft) 18s forwards; }
  /* Hospital — o, p, a die with J; H, s, t, l die with M; the i stays with R */
  .lt-H  { animation: lt-in 1.6s var(--ease-soft) 1.50s both, lt-out 4.2s var(--ease-soft) 9.4s forwards; }
  .lt-o  { animation: lt-in 1.6s var(--ease-soft) 1.62s both, lt-out 2.6s var(--ease-soft) 5.3s forwards; }
  .lt-s  { animation: lt-in 1.6s var(--ease-soft) 1.74s both, lt-out 4.2s var(--ease-soft) 8.6s forwards; }
  .lt-p  { animation: lt-in 1.6s var(--ease-soft) 1.86s both, lt-out 2.6s var(--ease-soft) 6.0s forwards; }
  .lt-i  { color: #414141; animation: lt-in-muted 1.6s var(--ease-soft) 1.98s both, lt-linger 11s var(--ease-soft) 18s forwards; }
  .lt-t2 { animation: lt-in 1.6s var(--ease-soft) 2.10s both, lt-out 4.2s var(--ease-soft) 10.2s forwards; }
  .lt-a  { animation: lt-in 1.6s var(--ease-soft) 2.22s both, lt-out 2.6s var(--ease-soft) 5.8s forwards; }
  .lt-l  { animation: lt-in 1.6s var(--ease-soft) 2.34s both, lt-out 4.2s var(--ease-soft) 9.8s forwards; }

  /* ── The demotion — before the multitude appears, the R gives up its
        capital and the i is raised to one: each survivor holds both glyphs
        stacked, and dissolves from one into the other. Then the two of them
        draw together at the center of the sign (JS measures the slide). ── */
  .sign .stack { display: inline-grid; justify-items: center; }
  .sign .g { grid-area: 1 / 1; }
  .sign .g-b { opacity: 0; }
  .lt-R .g-a, .lt-i .g-a { animation: g-out 3.2s var(--ease-soft) 12.4s forwards; }
  .lt-R .g-b, .lt-i .g-b { animation: g-in  3.2s var(--ease-soft) 12.4s forwards; }
  @keyframes g-out {
    0%   { opacity: 1; filter: blur(0); }
    100% { opacity: 0; filter: blur(3px); }
  }
  @keyframes g-in {
    0%   { opacity: 0; filter: blur(3px); }
    100% { opacity: 1; filter: blur(0); }
  }

  /* ── The stage — figures sit a breath above true center; the whole plane
        drifts almost imperceptibly with the cursor (parallax, set by JS) ── */
  .stage {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px 6vh;
    will-change: transform;
  }

  /* ── The ground — a hairline the three of them stand on; it draws itself
        in as they arrive and lets go once only R is left ── */
  .ground {
    --gy: clamp(110px, 17vh, 160px);
    position: absolute; left: 50%; top: 50%;
    width: min(580px, 74vw); height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.32) 20%, rgba(0,0,0,0.32) 80%, transparent);
    transform: translate(-50%, var(--gy)) scaleX(0);
    animation:
      ground-in 3s var(--ease-soft) 1.2s forwards,
      ground-out 5s var(--ease-soft) 12s forwards;
  }
  @keyframes ground-in  { to { transform: translate(-50%, var(--gy)) scaleX(1); } }
  @keyframes ground-out { to { opacity: 0; } }

  /* ── The trio — M, J, R as silhouettes alone now; their names live on the
        sign above. Each arrives alone, rising; each leaves alone ── */
  .trio {
    display: inline-flex; justify-content: center; align-items: flex-end;
  }
  .person {
    width: 150px;
    margin: 0 clamp(18px, 3vw, 30px);
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
    flex: 0 0 auto;
    opacity: 0;
    will-change: opacity, transform, filter, max-width, margin;
  }
  /* arrival: a soft rise out of the white, unblurring like a memory forming */
  @keyframes arrive {
    0%   { opacity: 0; filter: blur(6px); transform: translateY(22px); }
    100% { opacity: 1; filter: blur(0);   transform: translateY(0); }
  }

  /* each figure breathes — a slow, standing stillness that is not still */
  .person .fig {
    width: clamp(84px, 10.5vw, 122px); height: auto; display: block;
    transform-origin: 50% 100%;
  }
  @keyframes fig-breathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.009) scaleX(0.997); }
  }

  /* M — warm, broad, with an aura; arrives first, stays a few seconds
     longer than J, then leaves slowly */
  .person-m {
    animation:
      arrive 2.2s var(--ease-soft) 0.4s both,
      depart-m 7s var(--ease-leave) 8s forwards;
  }
  .person-m .fig { animation: fig-breathe 6.4s var(--ease-soft) 2.6s infinite; }
  .person-m .aura { animation: aura-breathe 5.5s var(--ease-soft) 1.2s infinite; }
  @keyframes aura-breathe {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.7; }
  }

  /* J — center, tall and lean; arrives second, leaves first and quickly */
  .person-j {
    width: 168px;
    animation:
      arrive 2.4s var(--ease-soft) 1s both,
      depart-j 3.8s var(--ease-leave) 4.5s forwards;
  }
  .person-j .fig { width: clamp(96px, 12vw, 138px); animation: fig-breathe 7.6s var(--ease-soft) 3.2s infinite; }

  /* R — arrives last, stays, and is unmade slowly. Deliberately the least
     interesting thing on the page: a lesser black, softly unfocused, his
     edges already halfway to the background. The violent drop to the bottom
     is measured and driven by JS (Web Animations), which outranks these. */
  .person-r {
    animation:
      arrive 2.4s var(--ease-soft) 1.8s both,
      r-oblivion 24s var(--ease-soft) 19s forwards;
  }
  .person-r .fig {
    width: clamp(92px, 11.6vw, 130px);
    opacity: 0.82;
    filter: blur(0.5px);
    /* after the fall he shrinks where he lies, anchored to the floor */
    animation:
      fig-breathe 5.6s var(--ease-soft) 4.2s infinite,
      r-diminish 22s var(--ease-soft) 18.5s forwards;
  }
  @keyframes r-oblivion {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  /* down to the scale of the multitude, from the ground up */
  @keyframes r-diminish {
    0%   { transform: scale(1); }
    100% { transform: scale(0.2); }
  }

  /* ── The impact — a shockwave hairline that spreads along the floor the
        instant the anchor lands (fired by JS, timed to the fall) ── */
  .impact {
    position: fixed; bottom: 2px; left: 50%; z-index: 2;
    width: min(70vw, 560px); height: 2px;
    transform: translateX(-50%) scaleX(0);
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.5), transparent);
    opacity: 0;
    pointer-events: none;
  }

  /* departures: each walks out of frame — a drift up and away, blurring as
     he goes; only after he is fully gone does his space breathe closed */
  @keyframes depart-j {
    0%   { opacity: 1; filter: blur(0);   transform: translate(0, 0);         max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    55%  { opacity: 0; filter: blur(7px); transform: translate(-24px, -34px); max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    100% { opacity: 0; filter: blur(7px); transform: translate(-24px, -34px); max-width: 0;     margin-left: 0; margin-right: 0; }
  }
  @keyframes depart-m {
    0%   { opacity: 1; filter: blur(0);   transform: translate(0, 0);        max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    55%  { opacity: 0; filter: blur(7px); transform: translate(26px, -32px); max-width: 200px; margin-left: clamp(18px, 3vw, 30px); margin-right: clamp(18px, 3vw, 30px); }
    100% { opacity: 0; filter: blur(7px); transform: translate(26px, -32px); max-width: 0;     margin-left: 0; margin-right: 0; }
  }

  /* The grain arrives with the solitude — fine film noise across the lone figure */
  .fig-grain {
    mix-blend-mode: screen;
    opacity: 0;
    animation: grain-in 6s var(--ease-soft) 13.5s forwards;
  }
  @keyframes grain-in { to { opacity: 0.24; } }

  /* ── The multitude — tiny silhouettes that first encircle R from the edges,
        then close in and multiply until the entire screen is black ── */
  .crowd {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Faint colorful overlays — the color belongs to the company: each wash
        recedes as its person leaves, so when only R remains, all color is
        gone. The tint plane counter-drifts against the cursor for depth. ── */
  .tints { position: fixed; inset: 0; z-index: 0; pointer-events: none; will-change: transform; }
  .tint {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(72px);
    opacity: 0;
  }
  .tint-cool {
    left: 50%; top: 43%; width: 480px; height: 430px;
    background: radial-gradient(circle, rgba(150,178,228,0.5), transparent 68%);
    animation: tint-with-j 8s var(--ease-soft) forwards;
  }
  .tint-warm {
    left: 39%; top: 47%; width: 440px; height: 390px;
    background: radial-gradient(circle, rgba(233,176,158,0.5), transparent 68%);
    animation: tint-with-m 12s var(--ease-soft) forwards;
  }
  .tint-lav {
    left: 45%; top: 37%; width: 360px; height: 340px;
    background: radial-gradient(circle, rgba(202,178,226,0.42), transparent 68%);
    animation: tint-with-m 12s var(--ease-soft) forwards;
  }
  .tint-mint {
    left: 44%; top: 55%; width: 340px; height: 320px;
    background: radial-gradient(circle, rgba(172,214,193,0.4), transparent 68%);
    animation: tint-with-m-late 11s var(--ease-soft) forwards;
  }
  @keyframes tint-with-j {
    0%   { opacity: 0; }
    18%  { opacity: 0.5; }
    53%  { opacity: 0.5; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m {
    0%   { opacity: 0; }
    11%  { opacity: 0.46; }
    71%  { opacity: 0.46; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m-late {
    0%   { opacity: 0; }
    12%  { opacity: 0.4; }
    77%  { opacity: 0.4; }
    100% { opacity: 0; }
  }

  /* ── The vignette — the room itself closes in as the crowd gathers,
        edges first, the way a theatre goes dark ── */
  .vignette {
    position: fixed; inset: 0; z-index: 4; pointer-events: none;
    background: radial-gradient(ellipse 95% 90% at 50% 46%, transparent 55%, rgba(0,0,0,0.42) 100%);
    opacity: 0;
    animation: vignette-in 22s var(--ease-soft) 20s forwards;
  }
  @keyframes vignette-in { to { opacity: 1; } }

  /* ── The envoi — out of the black: canvas-white cursive, centered, with a
        faint hairline flourish beneath ── */
  .envoi {
    position: fixed; inset: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    padding: 0 24px;
    pointer-events: none;
  }
  .envoi span {
    font-family: 'Parisienne', cursive;
    font-size: clamp(22px, 3.6vw, 42px);
    line-height: 1.3;
    color: rgba(244, 246, 249, 0.72);
    text-align: center;
    opacity: 0;
    letter-spacing: 0.01em;
    animation:
      envoi-in 0.9s var(--ease-soft) 49s forwards,
      envoi-breathe 1.1s var(--ease-soft) 49.9s 1;
  }
  /* small, quiet — a murmur out of the black, not an announcement */
  @keyframes envoi-in {
    0%   { opacity: 0;    letter-spacing: 0.01em; transform: translateY(5px); }
    100% { opacity: 0.85; letter-spacing: 0.05em; transform: translateY(0); }
  }
  @keyframes envoi-breathe {
    0%   { opacity: 0.85; transform: scale(1); }
    50%  { opacity: 0.72; transform: scale(1.006); }
    100% { opacity: 0.85; transform: scale(1); }
  }
  /* the flourish — a faint hairline that draws itself beneath the cursive */
  .envoi span::after {
    content: "";
    display: block;
    width: 30%; height: 1px;
    margin: 0.22em auto 0;
    background: linear-gradient(90deg, transparent, rgba(244,246,249,0.38), transparent);
    transform: scaleX(0);
    animation: flourish 1.4s var(--ease-soft) 49.5s forwards;
  }
  @keyframes flourish { to { transform: scaleX(1); } }

  /* ── Waterfall and fountain — canvas white pours in from above AND rises
        from below, three veils each: first a translucent mist, then a denser
        sheet, then the full white, every one with a long soft leading edge.
        They meet over the phrase and close it out between them. ── */
  .whiteout {
    position: fixed; inset: 0; z-index: 20;
    pointer-events: none;
    overflow: hidden;
  }
  .fall, .rise {
    position: absolute; left: 0; right: 0; height: 160%;
    will-change: transform;
  }
  .fall {
    top: 0;
    background: linear-gradient(180deg,
      var(--cold-white) 0%,
      var(--cold-white) 74%,
      rgba(244,246,249,0.55) 87%,
      rgba(244,246,249,0) 100%);
    transform: translateY(-105%);
  }
  .rise {
    bottom: 0;
    background: linear-gradient(0deg,
      var(--cold-white) 0%,
      var(--cold-white) 74%,
      rgba(244,246,249,0.55) 87%,
      rgba(244,246,249,0) 100%);
    transform: translateY(105%);
  }
  .fall-3 { opacity: 0.45; animation: fall 3.6s cubic-bezier(0.55, 0, 0.25, 1) 50.2s  forwards; }
  .fall-2 { opacity: 0.7;  animation: fall 3.3s cubic-bezier(0.55, 0, 0.25, 1) 50.35s forwards; }
  .fall-1 { opacity: 1;    animation: fall 3.0s cubic-bezier(0.55, 0, 0.25, 1) 50.5s  forwards; }
  .rise-3 { opacity: 0.45; animation: rise 3.6s cubic-bezier(0.55, 0, 0.25, 1) 50.3s  forwards; }
  .rise-2 { opacity: 0.7;  animation: rise 3.3s cubic-bezier(0.55, 0, 0.25, 1) 50.45s forwards; }
  .rise-1 { opacity: 1;    animation: rise 3.0s cubic-bezier(0.55, 0, 0.25, 1) 50.6s  forwards; }
  @keyframes fall { to { transform: translateY(-15%); } }
  @keyframes rise { to { transform: translateY(15%); } }
  /* as the waters settle, a fine paper noise rises into the blank canvas */
  .whiteout::after {
    content: ""; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch' seed='7'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E") 0/220px;
    mix-blend-mode: multiply;
    opacity: 0;
    animation: paper-in 4s var(--ease-soft) 51.8s forwards;
  }
  @keyframes paper-in { to { opacity: 0.045; } }

  /* ── Encore — after the canvas is blank, one quiet word, framed by
        hairlines that reach outward when met ── */
  .replay {
    position: fixed; left: 50%; bottom: clamp(22px, 5vh, 46px);
    transform: translateX(-50%);
    z-index: 30;
    display: flex; align-items: center; gap: 14px;
    background: none; border: 0; cursor: pointer;
    font-family: 'Cormorant SC', serif; font-weight: 500;
    font-size: clamp(12px, 1.5vw, 15px);
    letter-spacing: 0.3em; text-indent: 0.15em;
    color: var(--ink-lt);
    opacity: 0; pointer-events: none;
    transition: opacity 2.8s var(--ease-soft), color 0.5s ease;
  }
  .replay::before, .replay::after {
    content: ""; height: 1px; width: 26px;
    background: currentColor; opacity: 0.5;
    transition: width 0.8s var(--ease-soft);
  }
  .replay.is-on { opacity: 0.8; pointer-events: auto; }
  .replay:hover, .replay:focus-visible { color: var(--ink); outline: none; }
  .replay:hover::before, .replay:hover::after { width: 46px; }

  @media (max-width: 640px) {
    .trio { transform: scale(0.62); }
    .ground { --gy: 11vh; }
    .sign { letter-spacing: 0.06em; }
  }

  /* ── Reduced motion — a still tableau instead of a film ── */
  @media (prefers-reduced-motion: reduce) {
    .ambient, .tints, .crowd, .vignette, .whiteout, .envoi, .replay { display: none; }
    .grain, .person, .person .fig, .person-m .aura,
    .fig-grain, .ground, .sign .lt, .sign .g { animation: none; }
    .person, .sign .lt { opacity: 1; }
    .ground { transform: translate(-50%, var(--gy)) scaleX(1); opacity: 0.6; }
  }
</style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ambient" aria-hidden="true"></div>
  <div class="tints" aria-hidden="true">
    <span class="tint tint-warm"></span>
    <span class="tint tint-cool"></span>
    <span class="tint tint-lav"></span>
    <span class="tint tint-mint"></span>
  </div>
  <!-- two layers: the base accumulates settled figures; the top canvas lets
       each new arrival rise and breathe in before settling onto the base -->
  <canvas class="crowd" id="crowdBase" aria-hidden="true"></canvas>
  <canvas class="crowd" id="crowdFade" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <!-- The sign. Letter by letter, so it can lose them the same way. -->
  <h1 class="sign" aria-label="The MJR Hospital"><span aria-hidden="true"><span class="lt lt-T">T</span><span class="lt lt-h1">h</span><span class="lt lt-e1">e</span><span class="lt lt-M">M</span><span class="lt lt-J">J</span><span class="lt lt-R"><span class="stack"><span class="g g-a">R</span><span class="g g-b">r</span></span></span><span class="lt lt-H">H</span><span class="lt lt-o">o</span><span class="lt lt-s">s</span><span class="lt lt-p">p</span><span class="lt lt-i"><span class="stack"><span class="g g-a">i</span><span class="g g-b">I</span></span></span><span class="lt lt-t2">t</span><span class="lt lt-a">a</span><span class="lt lt-l">l</span></span></h1>

  <!-- Shared definitions: three distinct silhouettes; gradients, grain, aura ── -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- R: never true black — a flat, lesser grey whose edges give up
           early and dissolve into the background -->
      <linearGradient id="figFade" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#2e2e2e" stop-opacity="0.92"/>
        <stop offset="0.48" stop-color="#353535" stop-opacity="0.85"/>
        <stop offset="0.78" stop-color="#3d3d3d" stop-opacity="0.42"/>
        <stop offset="1"    stop-color="#3d3d3d" stop-opacity="0"/>
      </linearGradient>
      <!-- J: cooler-toned dark -->
      <linearGradient id="figFadeCool" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#070d1a" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#0c1422" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#18222f" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#18222f" stop-opacity="0"/>
      </linearGradient>
      <!-- M: warmer-toned dark -->
      <linearGradient id="figFadeWarm" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#160c06" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#1b1009" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#241a12" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#241a12" stop-opacity="0"/>
      </linearGradient>
      <!-- M's aura — a warm halo that no one else has -->
      <radialGradient id="auraGlow" cx="0.5" cy="0.42" r="0.6">
        <stop offset="0"    stop-color="#f2cd96" stop-opacity="0.7"/>
        <stop offset="0.55" stop-color="#eec488" stop-opacity="0.28"/>
        <stop offset="1"    stop-color="#eec488" stop-opacity="0"/>
      </radialGradient>
      <filter id="figGrain" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" seed="11" result="noise"/>
        <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
        <feComponentTransfer in="mono" result="opaqueGrain">
          <feFuncA type="discrete" tableValues="1"/>
        </feComponentTransfer>
        <feComposite in="opaqueGrain" in2="SourceGraphic" operator="in"/>
      </filter>

      <!-- J — tall, lean, upright: a long neck, level shoulders, and a chest
           that tapers cleanly. The head sits high in the frame. -->
      <g id="jBody">
        <path d="M130 22
                 C 152 22 168 40 168 66
                 C 168 84 162 98 152 107
                 C 145 113 138 116 130 116
                 C 122 116 115 113 108 107
                 C 98 98 92 84 92 66
                 C 92 40 108 22 130 22 Z"/>
        <path d="M118 111
                 L 118 140
                 C 118 146 123 149 130 149
                 C 137 149 142 146 142 140
                 L 142 111
                 C 137 120 123 120 118 111 Z"/>
        <path d="M130 141
                 C 118 142 108 145 99 150
                 C 84 158 70 166 62 176
                 C 57 183 55 191 56 200
                 C 58 220 64 258 68 300
                 L 192 300
                 C 196 258 202 220 204 200
                 C 205 191 203 183 198 176
                 C 190 166 176 158 161 150
                 C 152 145 142 142 130 141 Z"/>
      </g>

      <!-- M — shorter but built: shoulders far wider than the head, squared
           and confident, tapering with intent. -->
      <g id="mBody">
        <path d="M130 64
                 C 154 64 172 82 172 108
                 C 172 124 166 137 156 145
                 C 148 151 139 154 130 154
                 C 121 154 112 151 104 145
                 C 94 137 88 124 88 108
                 C 88 82 106 64 130 64 Z"/>
        <path d="M116 149
                 L 116 172
                 C 116 178 122 181 130 181
                 C 138 181 144 178 144 172
                 L 144 149
                 C 138 158 122 158 116 149 Z"/>
        <path d="M130 173
                 C 115 174 102 177 91 183
                 C 72 193 50 202 38 214
                 C 31 222 27 232 26 244
                 C 24 262 23 280 23 300
                 L 237 300
                 C 237 280 236 262 234 244
                 C 233 232 229 222 222 214
                 C 210 202 188 193 169 183
                 C 158 177 145 174 130 173 Z"/>
      </g>

      <!-- R — shortest and widest, and unmistakably the otaku: a big round
           face under a mess of uneven hair tufts, glasses whose temples poke
           past his cheeks, a little low ponytail hanging off one side, no
           neck at all, and a body that just swells outward the whole way
           down. One path, one flat presence — no taper, no aura, no air.
           (All subpaths wound the same way so the translucent grey fills
           evenly, with no dark seams where the shapes overlap.) -->
      <g id="rBody">
        <path d="M 112 86
                 C 116 82 124 82 130 86
                 C 136 82 144 82 148 86
                 C 154 82 162 84 165 90
                 C 171 88 177 93 177 100
                 C 182 104 184 112 181 118
                 C 184 126 184 136 180 144
                 C 177 158 168 170 156 177
                 C 148 181 139 183 130 183
                 C 121 183 112 181 104 177
                 C 92 170 83 158 80 144
                 C 76 136 76 126 79 118
                 C 76 112 78 104 83 100
                 C 83 93 89 88 95 90
                 C 98 84 106 82 112 86 Z
                 M 68 122
                 L 192 122
                 C 196 122 196 131 192 131
                 L 68 131
                 C 64 131 64 122 68 122 Z
                 M 166 156
                 C 176 158 185 166 189 178
                 C 192 188 191 197 187 203
                 C 184 197 179 189 173 183
                 C 168 178 164 166 166 156 Z
                 M 130 174
                 C 148 176 164 181 176 188
                 C 192 197 206 208 214 221
                 C 221 232 226 246 229 262
                 C 232 276 234 289 235 300
                 L 25 300
                 C 26 289 28 276 31 262
                 C 34 246 39 232 46 221
                 C 54 208 68 197 84 188
                 C 96 181 112 176 130 174 Z"/>
      </g>
    </defs>
  </svg>

  <main class="stage">
    <div class="ground" aria-hidden="true"></div>
    <div class="trio" role="img" aria-label="Three silhouettes: M, J, and R">
      <!-- M — warm-toned, broad, with an aura; arrives first, leaves second -->
      <div class="person person-m">
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true">
          <ellipse class="aura" cx="130" cy="165" rx="126" ry="140" fill="url(#auraGlow)"/>
          <use href="#mBody" fill="url(#figFadeWarm)"/>
        </svg>
      </div>
      <!-- J — center, tall and lean; arrives second, leaves first -->
      <div class="person person-j">
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true"><use href="#jBody" fill="url(#figFadeCool)"/></svg>
      </div>
      <!-- R — arrives last; the one who remains, alone, drained of color -->
      <div class="person person-r">
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true">
          <g class="fig-inner">
            <use href="#rBody" fill="url(#figFade)"/>
            <use href="#rBody" class="fig-grain" filter="url(#figGrain)"/>
          </g>
        </svg>
      </div>
    </div>
  </main>

  <!-- The shockwave along the floor, waiting for the anchor -->
  <div class="impact" aria-hidden="true"></div>

  <!-- The last word, waiting inside the black -->
  <div class="envoi">
    <span lang="fr">elle fait sa «&#8202;pas comme les autres&#8202;»</span>
  </div>

  <!-- The white that falls from above and rises from below, meeting over
       the phrase and taking everything back -->
  <div class="whiteout" aria-hidden="true">
    <div class="fall fall-3"></div>
    <div class="rise rise-3"></div>
    <div class="fall fall-2"></div>
    <div class="rise rise-2"></div>
    <div class="fall fall-1"></div>
    <div class="rise rise-1"></div>
  </div>

  <!-- Once the canvas is blank, one quiet offer -->
  <button class="replay" type="button" lang="fr">encore</button>

  <script>
  (function () {
    'use strict';

    var reduceMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return; // the CSS shows a still tableau instead

    var t0 = performance.now();

    // ── Encore ─────────────────────────────────────────────────────────────
    var replay = document.querySelector('.replay');
    if (replay) {
      setTimeout(function () { replay.classList.add('is-on'); }, 55000);
      replay.addEventListener('click', function () { location.reload(); });
    }

    // ── The demotion — as R gives up its capital and the i is raised, the
    //    two survivors draw slowly together at the center of the sign.
    //    (The slide lives on the inner .stack, so it can't fight the letter
    //    animations that own the outer span's transform.) ──────────────────
    var stR = document.querySelector('.lt-R .stack');
    var stI = document.querySelector('.lt-i .stack');
    var signEl = document.querySelector('.sign');
    if (stR && stI && signEl) {
      setTimeout(function () {
        var c = signEl.getBoundingClientRect();
        var center = c.left + c.width / 2;
        var gap = 0.24 * parseFloat(getComputedStyle(signEl).fontSize);
        var rRect = stR.getBoundingClientRect();
        var iRect = stI.getBoundingClientRect();
        [[stR, center - gap / 2 - rRect.right],
         [stI, center + gap / 2 - iRect.left]].forEach(function (p) {
          p[0].style.transition = 'transform 3.6s cubic-bezier(0.45, 0, 0.55, 1)';
          p[0].style.transform = 'translateX(' + p[1].toFixed(1) + 'px)';
        });
      }, 12500);
    }

    // ── The anchor — once he is centered and alone, the otaku drops
    //    violently to the bottom of the page, dragging the raised I down
    //    after him at their original spacing. The landing jolts the page,
    //    sends a shockwave along the floor, and wakes the multitude.
    //    (Web Animations outrank the CSS animations on these elements.) ────
    var DROP_AT = 16600, DROP_MS = 950;
    var personR = document.querySelector('.person-r');
    var ltIEl = document.querySelector('.lt-i');
    var impactEl = document.querySelector('.impact');
    if (personR && personR.animate) {
      setTimeout(function () {
        var dy = Math.max(0, window.innerHeight - personR.getBoundingClientRect().bottom);
        var fallEase = 'cubic-bezier(0.55, 0, 1, 0.45)'; // gravity
        function plunge(el, delay) {
          el.animate([
            { transform: 'translateY(0)', easing: fallEase },
            { transform: 'translateY(' + dy + 'px)', offset: 0.82, easing: 'ease-out' },
            { transform: 'translateY(' + (dy - 6) + 'px)', offset: 0.9, easing: 'ease-in' },
            { transform: 'translateY(' + dy + 'px)' }
          ], { duration: DROP_MS, delay: delay, fill: 'both' });
        }
        plunge(personR, 0);
        if (ltIEl) plunge(ltIEl, 110); // the chain snaps taut a beat later
        // the landing
        setTimeout(function () {
          if (impactEl && impactEl.animate) {
            impactEl.animate([
              { opacity: 0.55, transform: 'translateX(-50%) scaleX(0.08)' },
              { opacity: 0.26, transform: 'translateX(-50%) scaleX(1)' },
              { opacity: 0,    transform: 'translateX(-50%) scaleX(1.12)' }
            ], { duration: 1300, easing: 'cubic-bezier(0.2, 0.6, 0.3, 1)' });
          }
          if (document.body.animate) {
            document.body.animate([
              { transform: 'translateY(0)' },
              { transform: 'translateY(5px)' },
              { transform: 'translateY(-2px)' },
              { transform: 'translateY(0)' }
            ], { duration: 340, easing: 'ease-out' });
          }
        }, DROP_MS * 0.82);
      }, DROP_AT);
    }

    // ── Parallax — the stage, the sign, and the color plane drift a few
    //    pixels against the cursor, at different rates, giving depth ───────
    var stage = document.querySelector('.stage');
    var sign = document.querySelector('.sign');
    var tints = document.querySelector('.tints');
    if (stage && window.matchMedia('(pointer: fine)').matches) {
      var ptx = 0, pty = 0, pcx = 0, pcy = 0;
      window.addEventListener('pointermove', function (e) {
        ptx = e.clientX / window.innerWidth - 0.5;
        pty = e.clientY / window.innerHeight - 0.5;
      });
      (function drift() {
        pcx += (ptx - pcx) * 0.035;
        pcy += (pty - pcy) * 0.035;
        stage.style.transform = 'translate(' + (pcx * 8).toFixed(2) + 'px,' + (pcy * 6).toFixed(2) + 'px)';
        if (sign) sign.style.transform = 'translate(' + (pcx * 4).toFixed(2) + 'px,' + (pcy * 3).toFixed(2) + 'px)';
        if (tints) tints.style.transform = 'translate(' + (-pcx * 12).toFixed(2) + 'px,' + (-pcy * 9).toFixed(2) + 'px)';
        if (performance.now() - t0 < 51500) requestAnimationFrame(drift);
      })();
    }

    // ── The multitude ──────────────────────────────────────────────────────
    var base = document.getElementById('crowdBase');
    var top = document.getElementById('crowdFade');
    if (!base || !base.getContext || !top || !top.getContext) return;
    var bctx = base.getContext('2d');
    var fctx = top.getContext('2d');

    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, started = false;

    function size() {
      W = window.innerWidth; H = window.innerHeight;
      [[base, bctx], [top, fctx]].forEach(function (pair) {
        pair[0].width = Math.floor(W * dpr);
        pair[0].height = Math.floor(H * dpr);
        pair[0].style.width = W + 'px';
        pair[0].style.height = H + 'px';
        pair[1].setTransform(dpr, 0, 0, dpr, 0, 0);
        pair[1].fillStyle = '#000';
      });
    }
    size();
    // Resizing clears the accumulated canvas, so only honor it before the crowd begins.
    window.addEventListener('resize', function () { if (!started) size(); });

    // Timeline (ms from load). The anchor lands at ~17.4s.
    var START = 17400;        // the impact wakes the first tiny silhouettes
    var BLACK_START = 38000;  // they begin to multiply in earnest
    var BLACK_END = 48000;    // the screen is essentially black
    var SETTLE_END = 49600;   // a slow wash carries it the last step to pure black
    var WASH_START = BLACK_END - 5000;
    var FADE = 2100;          // each early silhouette breathes in over this long
    var RISE = 8;             // …rising these few pixels as it forms
    var REF_FRAME = 1000 / 60;
    var MAX_FADING = 900;     // safety cap on individually-animated figures

    // Exact expected number of silhouettes between two moments — an integral
    // of the spawn-rate curve. Time-based, so the crowd stays in sync with the
    // CSS timeline at any refresh rate, and catches up cleanly if the tab was
    // hidden and requestAnimationFrame paused.
    function spawnsBetween(a, b) {
      var total = 0;
      var s0 = Math.max(a, START), s1 = Math.min(b, BLACK_START);
      if (s1 > s0) {
        var D = BLACK_START - START;
        var u0 = s0 - START, u1 = s1 - START;
        total += (0.5 * (u1 - u0) + (13 / (3 * D * D)) * (u1 * u1 * u1 - u0 * u0 * u0)) / REF_FRAME;
      }
      var d0 = Math.max(a, BLACK_START), d1 = Math.min(b, BLACK_END);
      if (d1 > d0) {
        var DB = BLACK_END - BLACK_START;
        var v0 = d0 - BLACK_START, v1 = d1 - BLACK_START;
        total += (10 * (v1 - v0) + (35 / DB) * (v1 * v1 - v0 * v0)) / REF_FRAME;
      }
      return total;
    }

    // A single tiny silhouette — head + sloping shoulders, echoing the main figures
    function drawPerson(ctx, cx, topY, h, alpha) {
      ctx.globalAlpha = alpha;
      var hx = 0.16 * h, hy = 0.19 * h;
      var headCy = topY + hy + 0.02 * h;
      ctx.beginPath();
      ctx.ellipse(cx, headCy, hx, hy, 0, 0, Math.PI * 2);
      ctx.fill();
      var shTop = headCy + hy * 0.72;
      var bot = topY + h;
      var sh = 0.30 * h, bw = 0.24 * h;
      ctx.beginPath();
      ctx.moveTo(cx - 0.05 * h, shTop);
      ctx.quadraticCurveTo(cx - sh, shTop + 0.04 * h, cx - sh, shTop + 0.32 * h);
      ctx.lineTo(cx - bw, bot);
      ctx.lineTo(cx + bw, bot);
      ctx.lineTo(cx + sh, shTop + 0.32 * h);
      ctx.quadraticCurveTo(cx + sh, shTop + 0.04 * h, cx + 0.05 * h, shTop);
      ctx.closePath();
      ctx.fill();
    }

    var carry = 0;     // fractional spawn accumulator
    var fading = [];   // silhouettes still forming
    var lastT = 0;

    function frame() {
      var t = performance.now() - t0;
      var dt = t - lastT;

      // ── spawn ──
      if (t >= START && lastT < BLACK_END) {
        started = true;
        carry += spawnsBetween(Math.max(lastT, START), Math.min(t, BLACK_END));
        var n = Math.floor(carry);
        carry -= n;

        var inBlack = t >= BLACK_START;
        var settleDirect = inBlack || dt > 400; // hidden-tab backlog settles instantly
        var p = inBlack ? 1 : (t - START) / (BLACK_START - START);
        // early on, the crowd keeps its distance — a hollow ring around R
        // that closes as their numbers grow
        var keepOut = (1 - p) * 0.17 * W;

        for (var i = 0; i < n; i++) {
          var cx = Math.random() * W;
          if (keepOut > 0 && Math.abs(cx - W / 2) < keepOut) {
            var dir = cx >= W / 2 ? 1 : -1;
            cx = W / 2 + dir * (keepOut + Math.random() * Math.max(1, W / 2 - keepOut));
            cx = Math.min(W - 2, Math.max(2, cx));
          }
          var h = inBlack ? (12 + Math.random() * 22) : (10 + Math.random() * 16);
          // the multitude seeps up from the floor where the anchor struck,
          // reaching higher as their numbers grow
          var reach = inBlack ? 1 : Math.min(1, (t - START) / 6000);
          var topY = (H - h) - Math.random() * (H - h) * (0.18 + 0.82 * reach);
          var a = inBlack ? 0.92 : (0.45 + Math.random() * 0.4);
          if (settleDirect || fading.length >= MAX_FADING) {
            drawPerson(bctx, cx, topY, h, a);
          } else {
            fading.push({ cx: cx, topY: topY, h: h, a: a, born: t });
          }
        }
      }

      // ── the young silhouettes rise and breathe in on the top layer;
      //    the matured settle permanently onto the base ──
      if (fading.length) {
        fctx.clearRect(0, 0, W, H);
        for (var j = fading.length - 1; j >= 0; j--) {
          var q = fading[j];
          var e = (t - q.born) / FADE;
          if (e >= 1) {
            drawPerson(bctx, q.cx, q.topY, q.h, q.a);
            fading.splice(j, 1);
          } else {
            var k = e * e * (3 - 2 * e); // smoothstep
            drawPerson(fctx, q.cx, q.topY + (1 - k) * RISE, q.h, q.a * k);
          }
        }
        if (!fading.length) fctx.clearRect(0, 0, W, H);
      }

      // ── a slow, strengthening wash carries the scene to pure black ──
      // frame-rate independent: per-frame strength is normalized by dt
      if (t >= WASH_START && lastT < SETTLE_END) {
        var wp = Math.min((t - WASH_START) / (SETTLE_END - WASH_START), 1);
        var strength = 0.004 + 0.05 * wp * wp;
        bctx.globalAlpha = Math.min(1, 1 - Math.pow(1 - strength, dt / REF_FRAME));
        bctx.fillRect(0, 0, W, H);
        bctx.globalAlpha = 1;
      }

      lastT = t;

      if (t < SETTLE_END || fading.length) {
        requestAnimationFrame(frame);
      } else {
        // the wash has already finished the job; this is a safety net
        bctx.globalAlpha = 1;
        bctx.fillRect(0, 0, W, H);
      }
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
