<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC · At Rest</title>
<meta name="description" content="ARC is briefly at rest for maintenance. The record holds.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #d9381e;
    --ultramarine: #1e3a8a;
    --ochre: #b87c1a;
    --viridian: #3d7249;
    --pure-black: #000000;
    --cold-white: #f4f6f9;
    --ink: #000000;
    --ink-mid: #2c2c2c;
    --ink-lt: #6e6e6e;
    --border: rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--cold-white);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Film grain — identical recipe to the homepage ── */
  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none;
    opacity: .018; mix-blend-mode: multiply;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/180px;
  }

  /* ── Soft museum lighting — a single warm pool, very faint ── */
  .ambient {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 42%, rgba(255,248,235,0.55), transparent 70%);
    animation: ambient-breathe 11s ease-in-out infinite;
  }
  @keyframes ambient-breathe {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  /* ── The centered stage ── */
  .stage {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(14px, 3vh, 34px);
    padding: 40px 24px;
  }

  /* ── The MJR monogram ── */
  .monogram {
    display: inline-flex; justify-content: center; align-items: baseline;
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(76px, 12vw, 150px); line-height: 1;
    color: var(--ink);
    opacity: 0; animation: fade-in 2s ease 0.2s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }
  .letter {
    display: inline-block; overflow: hidden;
    letter-spacing: .12em; padding-right: .12em;
    will-change: opacity, max-width;
  }
  /* R — italic and lighter, echoing the R in the ARC wordmark; the one that remains */
  .letter-r {
    font-style: italic; font-weight: 300;
    animation: r-breathe 6s ease-in-out 13.5s infinite;
  }

  /* J fades and closes first, then M — the space gently collapses so R settles to center */
  @keyframes fade-collapse {
    0%   { opacity: 1; max-width: 1.1em; }
    100% { opacity: 0; max-width: 0; letter-spacing: 0; padding-right: 0; }
  }
  .letter-j { animation: fade-collapse 4s cubic-bezier(0.4, 0, 0.2, 1) 4s forwards; }
  .letter-m { animation: fade-collapse 4s cubic-bezier(0.4, 0, 0.2, 1) 9.5s forwards; }

  @keyframes r-breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.62; }
  }

  /* ── The man — a silhouette beneath the monogram ── */
  .figure {
    width: clamp(150px, 22vw, 230px); height: auto; display: block;
    opacity: 0; animation: fade-in 2.4s ease 0.5s forwards;
  }

  @media (max-width: 520px) {
    .stage { gap: 18px; }
  }
</style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ambient" aria-hidden="true"></div>

  <main class="stage">
    <div class="monogram" aria-label="MJR">
      <span class="letter letter-m">M</span><span class="letter letter-j">J</span><span class="letter letter-r">R</span>
    </div>

    <!-- The man — a dignified head-and-shoulders silhouette, dissolving at the base -->
    <svg class="figure" viewBox="0 0 260 300" aria-hidden="true">
      <defs>
        <linearGradient id="figFade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#000000" stop-opacity="1"/>
          <stop offset="62%"  stop-color="#0a0a0a" stop-opacity="1"/>
          <stop offset="88%"  stop-color="#1a1a1a" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <g fill="url(#figFade)">
        <!-- Head: an oval cranium tapering through cheek and jaw to a soft chin -->
        <path d="M130 28
                 C 160 28 182 52 182 86
                 C 182 106 175 123 162 134
                 C 153 141 142 145 130 145
                 C 118 145 107 141 98 134
                 C 85 123 78 106 78 86
                 C 78 52 100 28 130 28 Z"/>
        <!-- Neck: clearly narrower than the head, with a hint of trapezius -->
        <path d="M115 139
                 L 115 166
                 C 115 172 121 176 130 176
                 C 139 176 145 172 145 166
                 L 145 139
                 C 139 149 121 149 115 139 Z"/>
        <!-- Shoulders and upper chest: a graceful slope from the neck out to the
             shoulder, then down the arm, dissolving softly at the base -->
        <path d="M130 167
                 C 117 168 106 171 96 178
                 C 80 188 65 197 54 209
                 C 46 219 42 233 40 250
                 C 38 268 37 285 37 300
                 L 223 300
                 C 223 285 222 268 220 250
                 C 218 233 214 219 206 209
                 C 195 197 180 188 164 178
                 C 154 171 143 168 130 167 Z"/>
      </g>
    </svg>
  </main>
</body>
</html>
