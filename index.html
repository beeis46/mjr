<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC · At Rest</title>
<meta name="description" content="ARC is briefly at rest for maintenance. The record holds.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #d9381e;
    --ultramarine: #1e3a8a;
    --ochre: #b87c1a;
    --viridian: #3d7249;
    --pure-black: #000000;
    --cold-white: #f4f6f9;
    --ink: #000000;
    --ink-mid: #2c2c2c;
    --ink-lt: #6e6e6e;
    --border: rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--cold-white);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Film grain — identical recipe to the homepage ── */
  .grain {
    position: fixed; inset: 0; z-index: 9990; pointer-events: none;
    opacity: .018; mix-blend-mode: multiply;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/180px;
  }

  /* ── Soft museum lighting — a warm pool that, once the others are gone,
        slowly recedes and dims, leaving the lone figure in cold emptiness ── */
  .ambient {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 55% at 50% 42%, rgba(255,248,235,0.5), transparent 72%);
    filter: blur(34px);
    animation: ambient-arc 28s ease-in-out forwards;
  }
  @keyframes ambient-arc {
    0%   { opacity: 0.85; }
    5%   { opacity: 1; }
    18%  { opacity: 0.9; }
    32%  { opacity: 1; }
    50%  { opacity: 0.92; }
    100% { opacity: 0.05; }
  }

  /* ── The centered stage ── */
  .stage {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* ── The trio — M, J, R, each standing above its own silhouette ── */
  .trio {
    display: inline-flex; justify-content: center; align-items: flex-end;
    opacity: 0; animation: fade-in 2.2s ease 0.2s forwards;
  }
  .person {
    width: 150px;
    margin: 0 16px;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(16px, 3.4vh, 34px);
    overflow: hidden;
    flex: 0 0 auto;
    will-change: opacity, max-width, margin;
  }
  .person .letter {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(64px, 9vw, 116px); line-height: 1;
    letter-spacing: .04em; color: var(--ink);
  }
  /* M — a breath warmer than neutral (only while present) */
  .person-m .letter { color: #1c1310; }
  /* J — slightly bigger and cooler than the other two (only while present) */
  .person-j { width: 168px; }
  .person-j .letter { font-size: clamp(72px, 10.2vw, 132px); color: #111a28; }
  .person-j .fig { width: clamp(92px, 11.4vw, 132px); }
  /* R — italic, echoing the R in the ARC wordmark; the last one, who very slowly
     fades into oblivion */
  .person-r .letter { font-style: italic; color: #000000; }
  .person-r { animation: r-oblivion 28s cubic-bezier(0.55, 0, 0.85, 0.35) 17s forwards; }
  @keyframes r-oblivion {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  .person .fig { width: clamp(80px, 10vw, 116px); height: auto; display: block; }

  /* J vanishes first, then M — each letter AND its silhouette fade and close
     together, the space collapsing so the surviving R settles to center */
  @keyframes person-vanish {
    0%   { opacity: 1; max-width: 170px; margin-left: 16px; margin-right: 16px; }
    100% { opacity: 0; max-width: 0;     margin-left: 0;    margin-right: 0; }
  }
  .person-j { animation: person-vanish 4s cubic-bezier(0.4, 0, 0.2, 1) 4.5s forwards; }
  .person-m { animation: person-vanish 4s cubic-bezier(0.4, 0, 0.2, 1) 10s forwards; }

  /* the lone figure carries its grain quietly while the R dissolves */
  /* The grain arrives with the solitude — fine film noise across the lone figure */
  .fig-grain {
    mix-blend-mode: screen;
    opacity: 0;
    animation: grain-in 4.5s ease 14s forwards;
  }
  @keyframes grain-in { to { opacity: 0.32; } }

  /* ── The multitude — tiny silhouettes that gather in the background once R is
        alone, then multiply until the entire screen is black ── */
  .crowd {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ── Faint colorful overlays — random pastels, very subtle.
        Cool gathers around J, warm around M. The color belongs to the company:
        each wash recedes as its person vanishes, so when only R remains,
        all color is gone. ── */
  .tints { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .tint {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(72px);
    opacity: 0;
  }
  /* cool — with J (center); leaves when J leaves */
  .tint-cool {
    left: 50%; top: 43%; width: 480px; height: 430px;
    background: radial-gradient(circle, rgba(150,178,228,0.5), transparent 68%);
    animation: tint-with-j 8.5s ease forwards;
  }
  /* warm — with M (left); leaves when M leaves */
  .tint-warm {
    left: 39%; top: 47%; width: 440px; height: 390px;
    background: radial-gradient(circle, rgba(233,176,158,0.5), transparent 68%);
    animation: tint-with-m 14s ease forwards;
  }
  /* random pastels — lavender and mint, faint, gone by the time R is alone */
  .tint-lav {
    left: 45%; top: 37%; width: 360px; height: 340px;
    background: radial-gradient(circle, rgba(202,178,226,0.42), transparent 68%);
    animation: tint-with-m 14s ease forwards;
  }
  .tint-mint {
    left: 44%; top: 55%; width: 340px; height: 320px;
    background: radial-gradient(circle, rgba(172,214,193,0.4), transparent 68%);
    animation: tint-with-m-late 13s ease forwards;
  }
  @keyframes tint-with-j {
    0%   { opacity: 0; }
    18%  { opacity: 0.5; }
    53%  { opacity: 0.5; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m {
    0%   { opacity: 0; }
    11%  { opacity: 0.46; }
    71%  { opacity: 0.46; }
    100% { opacity: 0; }
  }
  @keyframes tint-with-m-late {
    0%   { opacity: 0; }
    12%  { opacity: 0.4; }
    77%  { opacity: 0.4; }
    100% { opacity: 0; }
  }

  @media (max-width: 640px) {
    .trio { transform: scale(0.62); }
  }
</style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="ambient" aria-hidden="true"></div>
  <div class="tints" aria-hidden="true">
    <span class="tint tint-warm"></span>
    <span class="tint tint-cool"></span>
    <span class="tint tint-lav"></span>
    <span class="tint tint-mint"></span>
  </div>
  <canvas class="crowd" aria-hidden="true"></canvas>

  <!-- Shared definitions: one silhouette, reused; gradients, grain, clip, fade ── -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="figFade" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#000000" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#0a0a0a" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#1a1a1a" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#1a1a1a" stop-opacity="0"/>
      </linearGradient>
      <!-- J: cooler-toned dark -->
      <linearGradient id="figFadeCool" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#070d1a" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#0c1422" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#18222f" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#18222f" stop-opacity="0"/>
      </linearGradient>
      <!-- M: warmer-toned dark -->
      <linearGradient id="figFadeWarm" gradientUnits="userSpaceOnUse" x1="130" y1="20" x2="130" y2="300">
        <stop offset="0"    stop-color="#160c06" stop-opacity="1"/>
        <stop offset="0.62" stop-color="#1b1009" stop-opacity="1"/>
        <stop offset="0.88" stop-color="#241a12" stop-opacity="0.55"/>
        <stop offset="1"    stop-color="#241a12" stop-opacity="0"/>
      </linearGradient>
      <filter id="figGrain" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" seed="11" result="noise"/>
        <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
        <feComponentTransfer in="mono" result="opaqueGrain">
          <feFuncA type="discrete" tableValues="1"/>
        </feComponentTransfer>
        <feComposite in="opaqueGrain" in2="SourceGraphic" operator="in"/>
      </filter>
      <!-- The one silhouette, reused by all three; fill is set per figure -->
      <g id="manBody">
        <path d="M130 28
                 C 160 28 182 52 182 86
                 C 182 106 175 123 162 134
                 C 153 141 142 145 130 145
                 C 118 145 107 141 98 134
                 C 85 123 78 106 78 86
                 C 78 52 100 28 130 28 Z"/>
        <path d="M115 139
                 L 115 166
                 C 115 172 121 176 130 176
                 C 139 176 145 172 145 166
                 L 145 139
                 C 139 149 121 149 115 139 Z"/>
        <path d="M130 167
                 C 117 168 106 171 96 178
                 C 80 188 65 197 54 209
                 C 46 219 42 233 40 250
                 C 38 268 37 285 37 300
                 L 223 300
                 C 223 285 222 268 220 250
                 C 218 233 214 219 206 209
                 C 195 197 180 188 164 178
                 C 154 171 143 168 130 167 Z"/>
      </g>
    </defs>
  </svg>

  <main class="stage">
    <div class="trio" aria-label="MJR">
      <!-- M — warm-toned; vanishes second -->
      <div class="person person-m">
        <span class="letter">M</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true"><use href="#manBody" fill="url(#figFadeWarm)"/></svg>
      </div>
      <!-- J — slightly bigger, cooler-toned; vanishes first -->
      <div class="person person-j">
        <span class="letter">J</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true"><use href="#manBody" fill="url(#figFadeCool)"/></svg>
      </div>
      <!-- R — neutral; the one who remains, alone, drained of color -->
      <div class="person person-r">
        <span class="letter">R</span>
        <svg class="fig" viewBox="0 0 260 300" aria-hidden="true">
          <g class="fig-inner">
            <use href="#manBody" fill="url(#figFade)"/>
            <use href="#manBody" class="fig-grain" filter="url(#figGrain)"/>
          </g>
        </svg>
      </div>
    </div>
  </main>

  <script>
  (function () {
    const canvas = document.querySelector('.crowd');
    if (!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext('2d');

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0, started = false;

    function size() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    size();
    // Resizing clears the accumulated canvas, so only honor it before the crowd begins.
    window.addEventListener('resize', function () { if (!started) size(); });

    // Timeline (ms from load). R is alone at ~14s.
    const START = 15000;        // the first few tiny silhouettes appear
    const BLACK_START = 38000;  // they begin to multiply in earnest
    const BLACK_END = 48000;    // the screen is entirely black
    const t0 = performance.now();

    ctx.fillStyle = '#000';

    // A single tiny silhouette — head + sloping shoulders, echoing the main figure
    function drawPerson(cx, topY, h, alpha) {
      ctx.globalAlpha = alpha;
      const hx = 0.16 * h, hy = 0.19 * h;
      const headCy = topY + hy + 0.02 * h;
      ctx.beginPath();
      ctx.ellipse(cx, headCy, hx, hy, 0, 0, Math.PI * 2);
      ctx.fill();
      const shTop = headCy + hy * 0.72;
      const bot = topY + h;
      const sh = 0.30 * h, bw = 0.24 * h;
      ctx.beginPath();
      ctx.moveTo(cx - 0.05 * h, shTop);
      ctx.quadraticCurveTo(cx - sh, shTop + 0.04 * h, cx - sh, shTop + 0.32 * h);
      ctx.lineTo(cx - bw, bot);
      ctx.lineTo(cx + bw, bot);
      ctx.lineTo(cx + sh, shTop + 0.32 * h);
      ctx.quadraticCurveTo(cx + sh, shTop + 0.04 * h, cx + 0.05 * h, shTop);
      ctx.closePath();
      ctx.fill();
    }

    let carry = 0; // fractional spawn accumulator

    function frame() {
      const t = performance.now() - t0;

      if (t >= START) {
        started = true;
        const inBlack = t >= BLACK_START;

        // spawn rate (per frame), accelerating
        let rate;
        if (!inBlack) {
          const p = (t - START) / (BLACK_START - START); // 0..1
          rate = 0.5 + 13 * p * p;
        } else {
          const bp = Math.min((t - BLACK_START) / (BLACK_END - BLACK_START), 1);
          rate = 10 + 70 * bp;
        }

        carry += rate;
        let n = Math.floor(carry);
        carry -= n;

        for (let i = 0; i < n; i++) {
          const cx = Math.random() * W;
          let h = inBlack ? (12 + Math.random() * 22) : (10 + Math.random() * 16);
          const topY = Math.random() * (H - h);
          const a = inBlack ? 0.92 : (0.45 + Math.random() * 0.4);
          drawPerson(cx, topY, h, a);
        }

        // only in the final seconds, a gentle wash closes the last gaps to pure black
        if (t >= BLACK_END - 4000) {
          ctx.globalAlpha = 0.012;
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, W, H);
        }
      }

      if (performance.now() - t0 < BLACK_END) {
        requestAnimationFrame(frame);
      } else {
        // guarantee a fully black screen at the end
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
      }
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
